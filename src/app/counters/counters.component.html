<section class="counters-section" id="counters">
  <div class="container">

    <div class="section-header">
      <h1>By The Numbers</h1>
      <p class="synopsis">A snapshot of my professional journey</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card" *ngFor="let s of stats; let i = index"
           [style.--card-delay]="(i * 120) + 'ms'">
        <div class="card-bar"></div>
        <div class="card-glow"></div>

        <div class="icon-wrap">
          <mat-icon class="stat-icon">{{ s.icon }}</mat-icon>
        </div>

        <div class="count-wrap">
          <span #countEl class="count">0</span>
          <span class="suffix">{{ s.suffix }}</span>
        </div>

        <p class="stat-label">{{ s.label }}</p>
      </div>
    </div>

  </div>
</section>
