<!-- ── Featured message banner (non-empty string from Firestore) ───────── -->
<div class="featured-banner" *ngIf="featuredMessage && !maintenanceMode">
  <span class="featured-icon">📢</span>
  <span class="featured-text">{{ featuredMessage }}</span>
  <span class="featured-glow"></span>
</div>

<!-- ── Normal app ──────────────────────────────────────────────────────── -->
<router-outlet *ngIf="!maintenanceMode"></router-outlet>

<!-- ── Maintenance overlay (covers entire viewport) ───────────────────── -->
<div class="maintenance-overlay" *ngIf="maintenanceMode" role="status" aria-live="polite">
  <div class="maintenance-card">
    <div class="maintenance-icon">🔧</div>
    <h1 class="maintenance-title">Under Maintenance</h1>
    <p class="maintenance-sub">
      We're making some improvements. Check back soon.
    </p>
  </div>
</div>
