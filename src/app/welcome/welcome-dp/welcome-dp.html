<div class="avatar-scene"
     (mousemove)="onMouseMove($event)"
     (mouseleave)="onMouseLeave()">

  <!-- Float wrapper: CSS keyframe floats this layer -->
  <div class="avatar-float">

    <!-- Tilt wrapper: JS writes transform here -->
    <div class="avatar-tilt" #tiltEl>
      <div class="avatar-object">
        <div class="avatar-glow"></div>

        <!-- ── Photo carousel ───────────────────────────────────── -->
        <div class="picture-stage" (click)="advance()">
          <!-- Back layer: outgoing image -->
          <div class="slide slide-back"
               *ngIf="prevIdx >= 0"
               [style.background-image]="'url(' + images[prevIdx] + ')'">
          </div>
          <!-- Front layer: active image — iris-wipes in when transitioning -->
          <div class="slide slide-front"
               [class.slide-iris-in]="transitioning"
               [style.background-image]="'url(' + images[activeIdx] + ')'">
          </div>
          <!-- Dot nav -->
          <div class="slide-dots">
            <span *ngFor="let img of images; let i = index"
                  class="slide-dot"
                  [class.active]="i === activeIdx"
                  (click)="$event.stopPropagation(); jumpTo(i)">
            </span>
          </div>
        </div>
        <div class="ring ring-1"><div class="ring-dot dot-1"></div></div>
        <div class="ring ring-2"><div class="ring-dot dot-2"></div></div>
        <div class="ring ring-3"><div class="ring-dot dot-3"></div></div>
        <div class="avatar-sheen"></div>
      </div>
    </div>
  </div>

  <!-- ── Planet orbits — centered on scene, outside float/tilt ── -->
  <div class="planet-orbits">

    <!-- Orbit A: inner, clockwise, 14s, 4 icons evenly at 90° steps -->
    <div class="po po-a">
      <div class="pi" style="background-image:url('assets/template/welcome/icons/html5.svg')"></div>
    </div>
    <div class="po po-a" style="animation-delay:-3.5s">
      <div class="pi" style="animation-delay:-3.5s;background-image:url('assets/template/welcome/icons/css3.svg')"></div>
    </div>
    <div class="po po-a" style="animation-delay:-7s">
      <div class="pi" style="animation-delay:-7s;background-image:url('assets/template/welcome/icons/java.svg')"></div>
    </div>
    <div class="po po-a" style="animation-delay:-10.5s">
      <div class="pi" style="animation-delay:-10.5s;background-image:url('assets/template/welcome/icons/sql.svg')"></div>
    </div>

    <!-- Orbit B: outer, counter-clockwise, 22s, 6 icons evenly at 60° steps -->
    <div class="po po-b">
      <div class="pi" style="background-image:url('assets/template/welcome/icons/android.svg')"></div>
    </div>
    <div class="po po-b" style="animation-delay:-3.67s">
      <div class="pi" style="animation-delay:-3.67s;background-image:url('assets/template/welcome/icons/apple.svg')"></div>
    </div>
    <div class="po po-b" style="animation-delay:-7.33s">
      <div class="pi" style="animation-delay:-7.33s;background-image:url('assets/template/welcome/icons/docker.svg')"></div>
    </div>
    <div class="po po-b" style="animation-delay:-11s">
      <div class="pi" style="animation-delay:-11s;background-image:url('assets/template/welcome/icons/git.svg')"></div>
    </div>
    <div class="po po-b" style="animation-delay:-14.67s">
      <div class="pi" style="animation-delay:-14.67s;background-image:url('assets/template/welcome/icons/php.svg')"></div>
    </div>
    <div class="po po-b" style="animation-delay:-18.33s">
      <div class="pi" style="animation-delay:-18.33s;background-image:url('assets/template/welcome/icons/bitbucket.svg')"></div>
    </div>

  </div>
</div>
