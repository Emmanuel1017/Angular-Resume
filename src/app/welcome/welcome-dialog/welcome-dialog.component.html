<div class="dialog-container">
  <div class="console">

    <div class="console-bar">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <p class="hello">Hello!</p>

    <div class="typing-wrap">
      <span class="prompt">&gt;&nbsp;</span>
      <span
        class="txt-rotate"
        typingAnimation
        [phrasePeriod]="2000"
        [startDelay]="1500"
        [typeSpeed]="70"
        [data]='[
          {
            "language": "en",
            "phrases": [
              "Senior Software Engineer.",
              "6+ yrs building production systems.",
              "Angular · Node.js · .NET · Cloud.",
              "Architecting scalable microservices.",
              "Healthcare: LIMS &amp; HL7 integrations.",
              "DevSecOps &amp; CI/CD pipelines.",
              "Turning complexity into clean code."
            ]
          }
        ]'></span>
    </div>

  </div>
</div>
