<header itemscope itemtype="https://schema.org/WPHeader" [class.menu-open]="hasMenuToggled">

    <div class="child navbar-toggle">
        <fa-icon [icon]="faBars" class="bar-icon" (click)="onToggleBar()"></fa-icon>
    </div>

    <div class="child logo-container" itemprop="brand" itemscope itemtype="https://schema.org/Brand">

        <a (click)="resetMenu()" href="#" class="logo" itemprop="name" itemprop="logo"> Korir K Emmanuel</a>
    </div>

    <div class="child nav-container" #nav [hidden]="!hasMenuToggled" itemscope itemtype="https://schema.org/SiteNavigationElement">
        <ul>
            <li><a (click)="resetMenu()" href="#about"  itemprop="url"><span itemprop="name">About Me</span></a></li>
            <li><a (click)="resetMenu()" href="#experience"  itemprop="url"><span itemprop="name">My Experiences</span></a></li>
            <li><a (click)="resetMenu()" href="#posts"  itemprop="url"><span itemprop="name">My Blog</span></a></li>
            <li><a (click)="resetMenu()" href="#contact"  itemprop="url"><span itemprop="name">Contact</span></a></li>
            <li><a (click)="resetMenu()" href="404-relax"  itemprop="url"><span itemprop="name">Relax</span></a></li>
            <!-- CV download — served from this repo's GitHub Release "cv-latest"
                 so updating the PDF is a one-step push, not a Firebase upload. -->
            <li><a (click)="resetMenu()"
                   href="https://github.com/Emmanuel1017/Angular-Resume/releases/download/cv-latest/cv.pdf"
                   rel="follow" title="Download CV" target="_blank">
              <span itemprop="name" class="cv-link">
                <mat-icon>file_download</mat-icon>
                <span class="cv-link-label">CV</span>
              </span>
            </a></li>
            <!-- Eye-catching "Get the App" CTA — only on the public web; hidden
                 inside the Flutter WebView (you're already in the app there). -->
            <li *ngIf="!isFlutterApp" class="get-app-li">
              <a (click)="resetMenu()" href="#app" class="get-app-cta" aria-label="Get the Android app">
                <span class="ga-paw" aria-hidden="true">
                  <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="20" cy="26" rx="10" ry="8" fill="currentColor"/>
                    <ellipse cx="11" cy="17" rx="4.5" ry="5.5" fill="currentColor"/>
                    <ellipse cx="20" cy="14" rx="4.5" ry="5.5" fill="currentColor"/>
                    <ellipse cx="29" cy="17" rx="4.5" ry="5.5" fill="currentColor"/>
                  </svg>
                </span>
                <span class="ga-label">Get the App</span>
                <span class="ga-dot"></span>
              </a>
            </li>
        </ul>
    </div>



    <div class="child share-container" #shareBtn>
        <fa-icon [icon]="faShareAlt" class="icon" (click)="share()" alt="share" itemprop="share"></fa-icon>
    </div>

</header>
