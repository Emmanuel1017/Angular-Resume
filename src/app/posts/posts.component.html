<section id="posts">
  <div class="container">

    <div class="section-header">
      <h1>Latest Posts</h1>
      <p class="synopsis">Thoughts, tutorials &amp; dev journals from my journey</p>
    </div>

    <div class="posts-stage" (swipe)="onSwipe($event)">
      <app-posts-carousel
          [posts]="posts"
          [currentPage]="currentPage"
          (onResultsPerPageChanged)="updateNavigation($event)">
      </app-posts-carousel>
    </div>

    <nav class="pagination" aria-label="Blog pages">
      <button class="pg-btn pg-arrow"
              (click)="onClickPrevious()"
              [disabled]="disablePreviousNavigation()"
              aria-label="Previous page">
        <fa-icon [icon]="faChevronLeft"></fa-icon>
      </button>

      <ng-container *ngFor="let p of pageNumbers">
        <span *ngIf="p === '...'" class="pg-ellipsis">…</span>
        <button *ngIf="p !== '...'"
                class="pg-btn pg-num"
                [class.active]="p === currentPage"
                (click)="goToPage(+p)"
                [attr.aria-current]="p === currentPage ? 'page' : null">
          {{ p }}
        </button>
      </ng-container>

      <button class="pg-btn pg-arrow"
              (click)="onClickNext()"
              [disabled]="disableNextNavigation()"
              aria-label="Next page">
        <fa-icon [icon]="faChevronRight"></fa-icon>
      </button>
    </nav>

  </div>
</section>
